[pytest]
# Keep `pytest` (run bare from the repo root, as CI does) deterministic
# regardless of what artifact trees happen to exist on a given machine.
#
# The repo's output/backup/archive trees contain FULL COPIES of the test
# suite (e.g. 06_BACKUPS/<snapshot>/character-bibles/.../tests/). Without
# this guard, `pytest` from the root recurses into them and fails at
# COLLECTION time on duplicate module basenames and broken relative
# imports -- taking down the whole run. CI only passes today because its
# fresh checkout lacks the gitignored backup dir; any local dev that has
# run a backup hits the failure. Excluding these trees makes local == CI.
#
# Live test roots (all still discovered): 00_SYSTEM/scripts/integration/tests,
# character-bibles/_library/tests, character-bibles/_review_app/tests,
# scripts/tests.
norecursedirs =
    06_BACKUPS
    05_RELEASE_ARCHIVE
    04_REJECTED_OUTPUTS
    04_APPROVED_FOR_PUSH
    02_ANTIGRAVITY_WORK
    01_CHATGPT_TO_ANTIGRAVITY
    01_IDEAS_INBOX
    .git
    node_modules
    __pycache__
    .pytest_cache
    *.egg-info
